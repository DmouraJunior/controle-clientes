<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle de Clientes</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1e293b; font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* Estilo do Campo de Busca com Botão */
        .busca-container { display: flex; gap: 10px; align-items: center; }
        .busca-container input { flex-grow: 1; margin: 0; }
        .busca-container button { width: auto; margin: 0; padding: 12px 20px; }

        /* Estilo do Spinner (Bolinha de Carregando) */
        .spinner { display: none; border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estilos do Resultado */
        .saldo-card { display: flex; justify-content: space-between; padding: 15px; background: #f1f5f9; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .historico-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>➕ Novo Lançamento</h2>
        <input type="text" id="cliente" placeholder="Nome do Cliente">
        <input type="date" id="data">
        <input type="text" id="descricao" placeholder="Ex: Vestido, Blusa, Parcela...">
        <input type="number" id="valor" placeholder="Valor (0.00)">
        <select id="tipo">
            <option value="Compra">🛍️ Compra (Dívida)</option>
            <option value="Pagamento">💵 Pagamento (Abate)</option>
        </select>
        <button id="btnSalvar" onclick="salvar()">
            <span>💾</span> Salvar no Sistema
        </button>
    </div>

    <div class="card">
        <h2>🔍 Buscar Cliente</h2>
        <div class="busca-container">
            <input type="text" id="busca" placeholder="Digite o nome do cliente...">
            <button id="btnBuscar" onclick="buscarNoSistema()">Buscar</button>
        </div>
        
        <div id="carregando" class="spinner"></div>

        <div id="resumo" style="display:none;">
            <div class="saldo-card">
                <span>Saldo Devedor Atual:</span>
                <span id="saldoTotal">R$ 0,00</span>
            </div>
            <div id="listaHistorico"></div>
        </div>
    </div>

    <script>
        // --- 1. COLE SUA URL DO GOOGLE AQUI ---
        // Certifique-se de manter as aspas e o ponto e vírgula no final.
        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbyq6KHQLDptVM0J_wQ9DrSo4pmyDx5s6sGksnDSZ5ajXt8OhcTfnC-mrEcx34FpxZogMw/exec";

        // Coloca a data de hoje automaticamente ao abrir o app
        document.getElementById('data').valueAsDate = new Date();

        // --- FUNÇÃO PARA SALVAR NOVO LANÇAMENTO ---
        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const dados = {
                data: document.getElementById('data').value,
                cliente: document.getElementById('cliente').value.trim(),
                descricao: document.getElementById('descricao').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value
            };

            if(!dados.cliente || isNaN(dados.valor) || dados.valor <= 0) {
                return alert("Por favor, preencha o Nome do Cliente e um Valor válido!");
            }

            btn.disabled = true;
            btn.innerHTML = "<span>⏳</span> Enviando...";

            try {
                // Envia os dados para o Google Sheets (modo no-cors para evitar erros de bloqueio)
                await fetch(URL_GOOGLE, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(dados)
                });
                alert("Lançamento salvo com sucesso!");
                // Limpa os campos para o próximo lançamento
                document.getElementById('cliente').value = '';
                document.getElementById('descricao').value = '';
                document.getElementById('valor').value = '';
                document.getElementById('data').valueAsDate = new Date();
            } catch (e) {
                alert("Erro ao salvar! Verifique sua conexão.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "<span>💾</span> Salvar no Sistema";
            }
        }

        // --- FUNÇÃO PARA BUSCAR CLIENTE E HISTÓRICO ---
        async function buscarNoSistema() {
            const termo = document.getElementById('busca').value.trim().toLowerCase();
            const btnBuscar = document.getElementById('btnBuscar');
            const spinner = document.getElementById('carregando');
            const areaResumo = document.getElementById('resumo');

            if(termo.length < 2) {
                return alert("Digite pelo menos 2 letras do nome para buscar.");
            }

            // 1. Mostra o spinner e esconde resultados anteriores
            spinner.style.display = 'block';
            areaResumo.style.display = 'none';
            btnBuscar.disabled = true;
            btnBuscar.innerText = "⏳...";

            try {
                // 2. Busca os dados puros do Google Sheets
                const response = await fetch(URL_GOOGLE);
                if (!response.ok) throw new Error('Erro na rede');
                const dados = await response.json();
                
                // 3. Filtra os dados pelo nome do cliente (coluna 1 da planilha)
                // Removemos a primeira linha (cabeçalho) antes de filtrar
                const historicoFiltrado = dados.slice(1).filter(linha => 
                    linha[1] && linha[1].toString().toLowerCase().includes(termo)
                );

                if (historicoFiltrado.length === 0) {
                    alert("Nenhum lançamento encontrado para este cliente.");
                    areaResumo.style.display = 'none';
                } else {
                    // 4. Exibe os resultados e calcula o saldo
                    exibirResultados(historicoFiltrado);
                }

            } catch (e) {
                console.error(e);
                alert("Erro ao buscar dados! Verifique a URL do Google Script.");
            } finally {
                // 5. Esconde o spinner e reativa o botão
                spinner.style.display = 'none';
                btnBuscar.disabled = false;
                btnBuscar.innerText = "Buscar";
            }
        }

        // --- FUNÇÃO PARA DESENHAR O HISTÓRICO E CALCULAR SALDO NA TELA ---
        function exibirResultados(lista) {
            const areaResumo = document.getElementById('resumo');
            const listaDiv = document.getElementById('listaHistorico');
            const saldoDiv = document.getElementById('saldoTotal');
            
            areaResumo.style.display = 'block';
            listaDiv.innerHTML = ""; // Limpa a lista atual
            let totalDevido = 0;

            // Ordena o histórico pela data (da mais antiga para a mais nova)
            lista.sort((a, b) => new Date(a[0]) - new Date(b[0]));

            lista.forEach(item => {
                // Formata a data para o padrão brasileiro (DD/MM/AAAA)
                const dataObj = new Date(item[0]);
                const dataFormatada = dataObj.toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                const descricao = item[2] || 'Sem descrição';
                const valor = parseFloat(item[3]);
                const tipo = item[4];

                if(isNaN(valor)) return; // Pula se o valor não for número

                if(tipo === "Compra") totalDevido += valor;
                else if(tipo === "Pagamento") totalDevido -= valor;

                // Adiciona o item na lista com cor correspondente (vermelho para compra, verde para pagamento)
                listaDiv.innerHTML += `
                    <div class="historico-item">
                        <div>
                            <strong>${dataFormatada}</strong><br>
                            <span style="color: #64748b;">${descricao}</span>
                        </div>
                        <span style="color: ${tipo === 'Compra' ? 'var(--danger)' : 'var(--success)'}; font-weight: bold;">
                            ${tipo === 'Compra' ? '+' : '-'} R$ ${valor.toFixed(2).replace('.', ',')}
                        </span>
                    </div>
                `;
            });

            // Atualiza o saldo total e muda a cor (vermelho se deve, verde se está em dia/crédito)
            saldoDiv.innerText = `R$ ${totalDevido.toFixed(2).replace('.', ',')}`;
            if (totalDevido > 0) {
                saldoDiv.style.color = 'var(--danger)';
            } else if (totalDevido < 0) {
                saldoDiv.style.color = 'var(--success)';
                saldoDiv.innerText += " (Crédito)";
            } else {
                saldoDiv.style.color = var(--text);
            }
        }
    </script>
</body>
</html>
