<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CONTROLE INTERNO MOURA VARIEDADES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #515252; --success: #16a34a; --danger: #dc2626; --bg-body: #9ca3af; --text-dark: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(180deg, var(--bg-body) 0%, #6b7280 100%); margin: 0; padding: 15px; color: var(--text-dark); min-height: 100vh; }
        
        #tela-login { display: flex; flex-direction: column; justify-content: center; min-height: 85vh; max-width: 400px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .titulo-principal { font-weight: bold; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: #111; margin-bottom: 20px; font-size: 1.1rem; border: none; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .debit-total { background: #1e293b; color: #fff; text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 20px; max-width: 500px; margin: 0 auto 20px auto; position: relative; }
        .debit-total span { display: block; font-size: 1.5rem; font-weight: bold; color: #f87171; margin: 5px 0; }
        .btn-toggle-view { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 20px; width: auto; padding: 0; margin: 0; display: inline-block; }

        .cliente-bloco { border: 2px solid var(--primary); border-radius: 10px; padding: 12px; margin-top: 15px; background: #fff; }
        .cliente-nome-header { background: var(--primary); padding: 8px; border-radius: 6px; margin: -12px -12px 10px -12px; font-weight: bold; color: white; text-align: center; }
        .saldo-card { display: flex; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 8px; font-weight: bold; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .alerta-debito { background: #fef08a !important; border: 2px solid #facc15 !important; color: #854d0e !important; }
        
        .historico-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }

        .sanfona-item { margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; overflow: hidden; }
        .sanfona-header { background: #f1f5f9; padding: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .sanfona-content { display: none; padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
        
        #tela-sistema { display: none; max-width: 500px; margin: auto; }
        .spinner { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-excluir { background: none; color: var(--danger); border: none; cursor: pointer; font-size: 18px; width: auto; padding: 5px; margin: 0; }

        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .pdf-table th { background-color: var(--primary); color: white; }
        .compra-val { color: var(--danger); font-weight: bold; }
        .pagamento-val { color: var(--success); font-weight: bold; }
        .pdf-resumo { margin-top: 20px; padding: 15px; background-color: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
        .pdf-resumo p { margin: 5px 0; }
        .saldo-final-val { font-size: 16px; font-weight: bold; color: var(--danger); }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="card">
            <div class="titulo-principal">SISTEMA DE CONTROLE INTERNO MOURA VARIEDADES</div>
            <input type="text" id="userInput" placeholder="Usuário">
            <input type="password" id="senhaInput" placeholder="Senha">
            <button onclick="verificarLogin()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="tela-sistema">
        <div class="debit-total">
            <button onclick="encerrarSessao()" style="position: absolute; top: 10px; right: 10px; width: auto; padding: 4px 8px; font-size: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #94a3b8; margin: 0;">SAIR</button>
            
            <div id="labelDebito">DÉBITO GERAL DA LOJA</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span id="valorDebitoTotal">****</span>
                <button class="btn-toggle-view" onclick="toggleDebitoGeral()">👁️</button>
            </div>
            
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 5px;">
                <button onclick="calcularDebitoTotal('geral')" style="background:transparent; font-size:10px; text-decoration:underline; width:auto; color: #94a3b8">TOTAL ACUMULADO</button>
                <button onclick="calcularDebitoTotal('mes')" style="background:transparent; font-size:10px; text-decoration:underline; width:auto; color: #94a3b8">DÉBITO DO MÊS</button>
            </div>
        </div>

        <div class="card">
            <h3 class="titulo-principal">➕ NOVO LANÇAMENTO</h3>
            <input type="text" id="cliente" placeholder="Nome do Cliente">
            <input type="date" id="data">
            <input type="text" id="descricao" placeholder="Descrição do item">
            <input type="number" id="valor" placeholder="Valor (0.00)">
            <select id="tipo">
                <option value="Compra">🛍️ Compra</option>
                <option value="Pagamento">💵 Pagamento</option>
            </select>
            <button id="btnSalvar" onclick="salvar()">💾 SALVAR</button>
            <button onclick="gerarRelatorioDia()" style="background:#0f172a; margin-top:10px; font-size:12px">📋 RELATÓRIO DO DIA (PDF)</button>
        </div>

        <div class="card">
            <h3 class="titulo-principal">🔍 BUSCA RÁPIDA</h3>
            <input type="text" id="busca" placeholder="Nome do cliente...">
            <button onclick="buscarNoSistema()">BUSCAR</button>
            <div id="carregando" class="spinner"></div>
            <div id="resumoBusca"></div>
        </div>

        <div class="card">
            <h3 class="titulo-principal">👥 LISTA DE CLIENTES</h3>
            <button id="btnCarregarLista" onclick="listarClientes()" style="background:#475569; margin-bottom:15px">📂 CARREGAR LISTA</button>
            <div id="listaSanfona"></div>
        </div>
    </div>

    <script>
        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxNAcztL0iDz4Ap_aHnGKWyMKGWgW6u3cz319zeeg2kH-0P0Fj0aaTKRRB5q1egbwhs7Q/exec";
        let debitoGeralReal = 0;
        let mostrandoDebito = false;

        function verificarLogin() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const senha = document.getElementById('senhaInput').value;
            const autorizados = ["edna", "junior", "mayara", "maraysa"];
            if (!autorizados.includes(user)) return alert("Não autorizado!");
            const salva = localStorage.getItem('senha_' + user) || "1234";
            if (senha === salva) { abrirSistema(); } else { alert("Senha incorreta!"); }
        }

        function encerrarSessao() {
            if(confirm("Deseja realmente sair?")) {
                document.getElementById('tela-sistema').style.display='none';
                document.getElementById('tela-login').style.display='flex'; 
                document.getElementById('userInput').value = '';
                document.getElementById('senhaInput').value = '';
            }
        }

        function abrirSistema() {
            document.getElementById('tela-login').style.display='none';
            document.getElementById('tela-sistema').style.display='block';
            document.getElementById('data').valueAsDate = new Date();
        }

        async function calcularDebitoTotal(modo) {
            const span = document.getElementById('valorDebitoTotal');
            const label = document.getElementById('labelDebito');
            span.innerText = "Calculando...";
            try {
                const resp = await fetch(URL_GOOGLE);
                const dados = await resp.json();
                let total = 0;
                const hoje = new Date();
                
                dados.slice(1).forEach(l => {
                    const dataLancamento = new Date(l[0]);
                    let v = parseFloat(l[3]);
                    
                    if (modo === 'mes') {
                        if (dataLancamento.getUTCMonth() === hoje.getUTCMonth() && dataLancamento.getUTCFullYear() === hoje.getUTCFullYear()) {
                            total += (l[4] === "Compra" ? v : -v);
                        }
                    } else {
                        total += (l[4] === "Compra" ? v : -v);
                    }
                });
                
                debitoGeralReal = total.toFixed(2);
                label.innerText = modo === 'mes' ? "DÉBITO DO MÊS ATUAL" : "DÉBITO TOTAL DA LOJA (GERAL)";
                span.innerText = mostrandoDebito ? "R$ " + debitoGeralReal : "****";
            } catch(e) { span.innerText = "****"; }
        }

        function toggleDebitoGeral() {
            const span = document.getElementById('valorDebitoTotal');
            mostrandoDebito = !mostrandoDebito;
            span.innerText = mostrandoDebito ? (debitoGeralReal === 0 ? "Clique abaixo" : "R$ " + debitoGeralReal) : "****";
        }

        async function buscarNoSistema() {
            const termo = document.getElementById('busca').value.trim().toLowerCase();
            if(termo.length < 2) return alert("Digite o nome!");
            const resumoDiv = document.getElementById('resumoBusca');
            document.getElementById('carregando').style.display = 'block';
            resumoDiv.innerHTML = '';
            try {
                const response = await fetch(URL_GOOGLE);
                const dados = await response.json();
                const filtrados = dados.slice(1).filter(l => l[1] && l[1].toString().toLowerCase().includes(termo));
                
                if (filtrados.length === 0) { 
                    resumoDiv.innerHTML = "Nenhum cliente encontrado."; 
                } else {
                    const grupos = {};
                    filtrados.forEach(item => {
                        const nome = item[1];
                        if (!grupos[nome]) grupos[nome] = [];
                        grupos[nome].push(item);
                    });
                    for (let nomeCliente in grupos) { renderizarCliente(nomeCliente, grupos[nomeCliente], resumoDiv); }
                }
            } catch (e) { alert("Erro na busca."); }
            finally { document.getElementById('carregando').style.display = 'none'; }
        }

        function renderizarCliente(nome, lista, container) {
            const idBloco = "bloco-" + Math.random().toString(36).substr(2, 9);
            let total = 0;
            let totalComprado = 0;
            let totalPago = 0;
            let htmlHistoricoVisivel = "";
            let htmlTabelaPDF = "";
            
            lista.forEach(item => {
                const dataFormatada = new Date(item[0]).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                const valor = parseFloat(item[3]);
                const tipo = item[4];
                
                if (tipo === "Compra") {
                    total += valor;
                    totalComprado += valor;
                } else {
                    total -= valor;
                    totalPago += valor;
                }
                
                htmlHistoricoVisivel += `<div class="historico-item">
                    <div><strong>${dataFormatada}</strong><br><small>${item[2] || ''}</small></div>
                    <div style="display:flex; align-items:center; gap:8px">
                        <span style="color:${tipo==='Compra'?'red':'green'}">R$ ${valor.toFixed(2)}</span>
                        <button class="btn-excluir" onclick="excluirLinha('${item[0]}', '${nome}', '${item[2]}', ${valor})">🗑️</button>
                    </div>
                </div>`;

                htmlTabelaPDF += `<tr>
                    <td>${dataFormatada}</td>
                    <td>${item[2] || '---'}</td>
                    <td>${tipo === 'Compra' ? '🛍️ Compra' : '💵 Pagamento'}</td>
                    <td class="${tipo === 'Compra' ? 'compra-val' : 'pagamento-val'}">R$ ${valor.toFixed(2)}</td>
                </tr>`;
            });

            const classeAlerta = total >= 500 ? "alerta-debito" : "";

            let htmlFinal = `<div class="cliente-bloco" id="${idBloco}">
                <div class="cliente-nome-header">👤 ${nome}</div>
                <div id="print-${idBloco}" class="print-container">
                    <div class="pdf-header" style="display:none; padding: 20px 0; font-family: sans-serif;">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px;">
                            <div style="text-align: left;">
                                <h1 style="margin: 0; color: #111; font-size: 24px; text-transform: uppercase; letter-spacing: 1px;">MOURA VARIEDADES</h1>
                                <p style="margin: 5px 0 0; font-size: 10px; color: #555;">Rua Vila do Forte, nº 201, Cordeiro, Recife-Pe</p>
                            </div>
                            <div style="text-align: right; font-size: 10px; color: #555;">
                                <p style="margin: 0;">(81) 99938-3019</p>
                                <p style="margin: 5px 0 0;">@moura_variedad</p>
                            </div>
                        </div>
                        <h2 style="text-align:center; text-transform:uppercase; font-size: 16px; margin-top: 20px;">EXTRATO DE CONTA</h2>
                        <h3 style="text-align:center; font-size: 18px; color: var(--primary); margin: 5px 0 20px;">👤 ${nome}</h3>
                    </div>

                    <div class="saldo-card ${classeAlerta}"><span>Dívida Atual:</span><span class="val-saldo">R$ ${total.toFixed(2)}</span></div>
                    <div class="historico-visivel">${htmlHistoricoVisivel}</div>

                    <div class="pdf-exclusivo" style="display:none;">
                        <table class="pdf-table">
                            <thead>
                                <tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Valor</th></tr>
                            </thead>
                            <tbody>
                                ${htmlTabelaPDF}
                            </tbody>
                        </table>
                        
                        <div class="pdf-resumo">
                            <h4 style="margin: 0 0 10px; text-transform:uppercase; font-size: 14px;">RESUMO FINANCEIRO</h4>
                            <p>🛍️ Total Comprado: <strong style="color:var(--danger)">R$ ${totalComprado.toFixed(2)}</strong></p>
                            <p>💵 Total Pago/Abatido: <strong style="color:var(--success)">R$ ${totalPago.toFixed(2)}</strong></p>
                            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 10px 0;">
                            <p class="saldo-final">💰 SALDO DEVEDOR FINAL: <span class="saldo-final-val">R$ ${total.toFixed(2)}</span></p>
                        </div>
                    </div>
                </div>
                <button style="background:#475569;margin-top:10px;font-size:13px" onclick="gerarPDFPersonalizado('print-${idBloco}', '${nome}')">📄 GERAR PDF</button>
            </div>`;
            
            container.innerHTML += htmlFinal;
            const bloco = document.getElementById(idBloco);
            const saldoSpan = bloco.querySelector('.val-saldo');
            saldoSpan.style.color = total > 0 && total < 500 ? 'red' : (total >= 500 ? '#854d0e' : 'green');
        }

        async function excluirLinha(data, cliente, descricao, valor) {
            if(!confirm("Deseja excluir este lançamento?")) return;
            try {
                await fetch(URL_GOOGLE, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({acao: 'excluir', data, cliente, descricao, valor}) 
                });
                alert("Pedido de exclusão enviado! Atualize a busca.");
                buscarNoSistema();
            } catch(e) { alert("Erro ao excluir."); }
        }

        function gerarPDFPersonalizado(id, nome) {
            const elemento = document.getElementById(id);
            
            elemento.querySelector('.pdf-header').style.display = 'block';
            elemento.querySelector('.pdf-exclusivo').style.display = 'block';
            elemento.querySelector('.historico-visivel').style.display = 'none';
            elemento.querySelector('.saldo-card').style.display = 'none';

            const opcoes = {
                margin: 10,
                filename: `Extrato_${nome}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opcoes).from(elemento).save().then(() => {
                    elemento.querySelector('.pdf-header').style.display = 'none';
                    elemento.querySelector('.pdf-exclusivo').style.display = 'none';
                    elemento.querySelector('.historico-visivel').style.display = 'block';
                    elemento.querySelector('.saldo-card').style.display = 'flex';
                });
            }, 500);
        }

        async function gerarRelatorioDia() {
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            try {
                const resp = await fetch(URL_GOOGLE);
                const dados = await resp.json();
                const hojeIso = new Date().toISOString().split('T')[0];
                
                let conteudo = `<div style="padding:20px; font-family:sans-serif;">
                    <h2 style="text-align:center">RELATÓRIO DIÁRIO - MOURA VARIEDADES</h2>
                    <p style="text-align:center">Data: ${dataHoje}</p><hr>`;
                
                let temDados = false;
                dados.slice(1).forEach(l => {
                    const dataL = new Date(l[0]).toISOString().split('T')[0];
                    if(dataL === hojeIso) {
                        temDados = true;
                        conteudo += `<p><strong>${l[1]}</strong>: ${l[4]} de R$ ${parseFloat(l[3]).toFixed(2)} (${l[2] || ''})</p>`;
                    }
                });

                if(!temDados) return alert("Nenhum lançamento hoje.");
                
                conteudo += `</div>`;
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = conteudo;
                html2pdf().set({ margin: 10, filename: `Relatorio_${dataHoje}.pdf` }).from(tempDiv).save();
            } catch(e) { alert("Erro ao gerar relatório."); }
        }

        async function listarClientes() {
            const div = document.getElementById('listaSanfona');
            const btn = document.getElementById('btnCarregarLista');
            if (div.innerHTML !== "") { div.innerHTML = ""; btn.innerText = "📂 CARREGAR LISTA"; return; }
            div.innerHTML = "Carregando...";
            btn.innerText = "⌛ AGUARDE...";
            try {
                const resp = await fetch(URL_GOOGLE);
                const dados = await resp.json();
                const clientes = [...new Set(dados.slice(1).map(l => l[1]))].sort();
                div.innerHTML = "";
                clientes.forEach(nome => {
                    const item = document.createElement('div');
                    item.className = 'sanfona-item';
                    item.innerHTML = `<div class="sanfona-header" onclick="toggleSanfona(this)"><span>👤 ${nome}</span> <span>➕</span></div>
                        <div class="sanfona-content"><button style="background:#f59e0b;font-size:12px;width:auto" onclick="editarNome('${nome}')">✏️ RENOMEAR</button></div>`;
                    div.appendChild(item);
                });
                btn.innerText = "❌ FECHAR LISTA";
            } catch(e) { div.innerHTML = "Erro."; btn.innerText = "📂 CARREGAR LISTA"; }
        }

        function toggleSanfona(el) {
            const content = el.nextElementSibling;
            const icone = el.querySelector('span:last-child');
            content.style.display = content.style.display === "block" ? "none" : "block";
            icone.innerText = content.style.display === "block" ? "➖" : "➕";
        }

        async function editarNome(nomeAntigo) {
            const novoNome = prompt("Novo nome para " + nomeAntigo);
            if (!novoNome) return;
            await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify({nomeAntigo, nomeNovo: novoNome, acao: 'editar'}) });
            alert("Pedido enviado!");
        }

        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const dados = { 
                data: document.getElementById('data').value, 
                cliente: document.getElementById('cliente').value.trim(), 
                descricao: document.getElementById('descricao').value, 
                valor: parseFloat(document.getElementById('valor').value), 
                tipo: document.getElementById('tipo').value 
            };
            if(!dados.cliente || isNaN(dados.valor)) return alert("Preencha Nome e Valor!");
            
            btn.disabled = true; 
            btn.innerText = "Salvando...";
            try {
                await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                alert("Salvo com sucesso!");
                document.getElementById('cliente').value = '';
                document.getElementById('valor').value = '';
                document.getElementById('descricao').value = '';
            } catch(e) { alert("Erro ao salvar!"); }
            finally { btn.disabled = false; btn.innerText = "💾 SALVAR"; }
        }
    </script>
</body>
</html>
