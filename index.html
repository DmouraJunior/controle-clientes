<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Restrito</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1e293b; font-size: 1.1rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; background: none; border: none; color: #64748b; width: auto; padding: 0; margin: 0; }

        #tela-login, #tela-primeiro-acesso { display: flex; flex-direction: column; justify-content: center; min-height: 80vh; max-width: 400px; margin: auto; }
        #tela-primeiro-acesso, #tela-sistema { display: none; }

        .busca-container { display: flex; gap: 10px; align-items: center; }
        .busca-container input { flex-grow: 1; margin: 0; }
        .busca-container button { width: auto; margin: 0; padding: 12px 20px; }

        .spinner { display: none; border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cliente-bloco { border: 2px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-bottom: 20px; background: #fff; }
        .cliente-nome-header { background: #f1f5f9; padding: 8px; border-radius: 6px; margin: -10px -10px 10px -10px; font-weight: bold; color: var(--primary); }
        .saldo-card { display: flex; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 8px; font-weight: bold; }
        .historico-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <h2 style="justify-content:center; border:none;">🔐 Login Autorizado</h2>
        <input type="text" id="userInput" placeholder="Seu Nome (edna, junior...)">
        <div class="password-container">
            <input type="password" id="senhaInput" placeholder="Sua Senha">
            <button type="button" class="toggle-password" onclick="toggleVisibility('senhaInput')">👁️</button>
        </div>
        <button onclick="verificarLogin()">Entrar</button>
    </div>

    <div id="tela-primeiro-acesso" class="card">
        <h2 style="color: var(--danger); border-color: #fee2e2;">⚠️ Criar Nova Senha</h2>
        <p style="font-size: 14px; color: #64748b;">Olá! Como é seu primeiro acesso, crie uma senha segura agora.</p>
        <div class="password-container">
            <input type="password" id="novaSenhaObrigatoria" placeholder="Nova Senha">
            <button type="button" class="toggle-password" onclick="toggleVisibility('novaSenhaObrigatoria')">👁️</button>
        </div>
        <button style="background: var(--success);" onclick="salvarNovaSenhaEEntrar()">Salvar e Acessar Sistema</button>
    </div>

    <div id="tela-sistema">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="border:none; margin:0;">➕ Novo Lançamento</h2>
                <button onclick="location.reload()" style="width: auto; padding: 5px 10px; background: #64748b;">Sair</button>
            </div>
            <input type="text" id="cliente" placeholder="Nome do Cliente">
            <input type="date" id="data">
            <input type="text" id="descricao" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor (0.00)">
            <select id="tipo">
                <option value="Compra">🛍️ Compra (Dívida)</option>
                <option value="Pagamento">💵 Pagamento (Abate)</option>
            </select>
            <button id="btnSalvar" onclick="salvar()">💾 Salvar</button>
        </div>

        <div class="card">
            <h2>🔍 Buscar Cliente</h2>
            <div class="busca-container">
                <input type="text" id="busca" placeholder="Nome do cliente...">
                <button onclick="buscarNoSistema()">Buscar</button>
            </div>
            <div id="carregando" class="spinner"></div>
            <div id="resumo"></div>
        </div>
    </div>

    <script>
        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbyq6KHQLDptVM0J_wQ9DrSo4pmyDx5s6sGksnDSZ5ajXt8OhcTfnC-mrEcx34FpxZogMw/exec";
        const SENHA_PADRAO = "1234";
        // LISTA DE USUÁRIOS PERMITIDOS
        const USUARIOS_AUTORIZADOS = ["edna", "junior", "mayara", "maraysa"];

        function toggleVisibility(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        function verificarLogin() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const senhaDigitada = document.getElementById('senhaInput').value;
            const senhaSalva = localStorage.getItem('senha_' + user);

            // Verifica se o usuário está na lista
            if (!USUARIOS_AUTORIZADOS.includes(user)) {
                return alert("Usuário não autorizado!");
            }

            // Primeiro acesso (senha 1234)
            if (!senhaSalva && senhaDigitada === SENHA_PADRAO) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-primeiro-acesso').style.display = 'flex';
                return;
            }

            // Acesso com senha personalizada
            if (senhaSalva && senhaDigitada === senhaSalva) {
                abrirSistema();
                return;
            }

            alert("Senha incorreta para o usuário " + user);
        }

        function salvarNovaSenhaEEntrar() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const nova = document.getElementById('novaSenhaObrigatoria').value;
            
            if (nova.length < 4 || nova === "1234") {
                return alert("Crie uma senha de 4 dígitos diferente de 1234.");
            }
            
            localStorage.setItem('senha_' + user, nova);
            alert("Senha definida com sucesso!");
            abrirSistema();
        }

        function abrirSistema() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-primeiro-acesso').style.display = 'none';
            document.getElementById('tela-sistema').style.display = 'block';
            document.getElementById('data').valueAsDate = new Date();
        }

        // --- FUNÇÕES DE DADOS ---
        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const dados = {
                data: document.getElementById('data').value,
                cliente: document.getElementById('cliente').value.trim(),
                descricao: document.getElementById('descricao').value,
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value
            };
            if(!dados.cliente || !dados.valor) return alert("Preencha Nome e Valor!");
            btn.disabled = true; btn.innerText = "⏳...";
            try {
                await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                alert("Salvo!");
                document.getElementById('cliente').value = '';
                document.getElementById('valor').value = '';
            } catch (e) { alert("Erro ao conectar."); }
            finally { btn.disabled = false; btn.innerText = "💾 Salvar"; }
        }

        async function buscarNoSistema() {
            const termo = document.getElementById('busca').value.trim().toLowerCase();
            const resumoDiv = document.getElementById('resumo');
            if(termo.length < 2) return alert("Digite ao menos 2 letras.");
            document.getElementById('carregando').style.display = 'block';
            resumoDiv.innerHTML = '';
            try {
                const response = await fetch(URL_GOOGLE);
                const dados = await response.json();
                const filtrados = dados.slice(1).filter(l => l[1] && l[1].toString().toLowerCase().includes(termo));
                
                const grupos = {};
                filtrados.forEach(item => {
                    const nome = item[1];
                    if (!grupos[nome]) grupos[nome] = [];
                    grupos[nome].push(item);
                });

                for (let nomeCliente in grupos) {
                    renderizarCliente(nomeCliente, grupos[nomeCliente]);
                }
            } catch (e) { alert("Erro ao buscar."); }
            finally { document.getElementById('carregando').style.display = 'none'; }
        }

        function renderizarCliente(nome, lista) {
            const resumoDiv = document.getElementById('resumo');
            const idBloco = "bloco-" + Math.random().toString(36).substr(2, 9);
            let total = 0;
            let html = `<div class="cliente-bloco" id="${idBloco}">
                <div class="cliente-nome-header">👤 ${nome}</div>
                <div id="print-${idBloco}">
                    <div class="saldo-card"><span>Dívida Total:</span><span class="val-saldo"></span></div>`;
            lista.forEach(item => {
                const valor = parseFloat(item[3]);
                const tipo = item[4];
                total += (tipo === "Compra" ? valor : -valor);
                html += `<div class="historico-item">
                    <div><strong>${new Date(item[0]).toLocaleDateString('pt-BR', {timeZone: 'UTC'})}</strong><br><small>${item[2] || ''}</small></div>
                    <span style="color: ${tipo === 'Compra' ? 'red' : 'green'}">R$ ${valor.toFixed(2)}</span>
                </div>`;
            });
            html += `</div><button class="btn-pdf" style="background:#475569;margin-top:10px" onclick="gerarPDF('print-${idBloco}', '${nome}')">📄 Gerar PDF</button></div>`;
            resumoDiv.innerHTML += html;
            const bloco = document.getElementById(idBloco);
            const saldoSpan = bloco.querySelector('.val-saldo');
            saldoSpan.innerText = `R$ ${total.toFixed(2)}`;
            saldoSpan.style.color = total > 0 ? 'red' : 'green';
        }

        function gerarPDF(id, nome) {
            const elemento = document.getElementById(id);
            html2pdf().set({ margin: 10, filename: `Extrato_${nome}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(elemento).save();
        }
    </script>
</body>
</html>
