<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Interno - Moura Variedades</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #515252; --success: #16a34a; --danger: #dc2626; --bg-body: #9ca3af; --text-dark: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(180deg, var(--bg-body) 0%, #6b7280 100%); margin: 0; padding: 15px; color: var(--text-dark); min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        h3 { border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 8px; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Painel de Débito */
        .debit-total { background: #1e293b; color: #fff; text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .debit-total span { display: block; font-size: 1.5rem; font-weight: bold; color: #f87171; }

        /* Efeito Sanfona */
        .sanfona-item { margin-bottom: 5px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .sanfona-header { background: #eee; padding: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .sanfona-content { display: none; padding: 10px; background: #fff; }
        
        .btn-edit { background: #f59e0b; font-size: 12px; padding: 5px; width: auto; margin: 5px 0; }
        .busca-container { display: flex; gap: 8px; border: 2px solid var(--primary); border-radius: 30px; background: #fff; padding: 4px; }
        .busca-container input { border: none; flex-grow: 1; margin: 0; }
        .busca-container button { width: auto; margin: 0; border-radius: 30px; }

        #tela-login, #tela-primeiro-acesso { display: flex; flex-direction: column; justify-content: center; min-height: 80vh; }
        #tela-primeiro-acesso, #tela-sistema { display: none; }
        .spinner { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <h2 style="text-align:center">Moura Variedades</h2>
        <input type="text" id="userInput" placeholder="Nome do Funcionário">
        <input type="password" id="senhaInput" placeholder="Senha">
        <button onclick="verificarLogin()">Entrar</button>
    </div>

    <div id="tela-primeiro-acesso" class="card">
        <h3>⚠️ Definir Senha Pessoal</h3>
        <input type="password" id="novaSenhaObrigatoria" placeholder="Nova Senha">
        <button onclick="salvarNovaSenhaEEntrar()">Salvar e Entrar</button>
    </div>

    <div id="tela-sistema">
        <div class="debit-total">
            DÉBITO TOTAL DA LOJA
            <span id="valorDebitoTotal">R$ 0,00</span>
            <button onclick="calcularDebitoTotal()" style="background:transparent; font-size:12px; text-decoration:underline">Atualizar Saldo Geral</button>
        </div>

        <div class="card">
            <h3>➕ Novo Lançamento</h3>
            <input type="text" id="cliente" placeholder="Nome do Cliente">
            <input type="date" id="data">
            <input type="number" id="valor" placeholder="Valor">
            <select id="tipo">
                <option value="Compra">🛍️ Compra</option>
                <option value="Pagamento">💵 Pagamento</option>
            </select>
            <button id="btnSalvar" onclick="salvar()">Salvar</button>
        </div>

        <div class="card">
            <h3>👥 Meus Clientes (Sanfona)</h3>
            <button onclick="listarClientes()" style="background:#475569">Carregar Lista de Clientes</button>
            <div id="listaSanfona" style="margin-top:15px"></div>
        </div>

        <div class="card">
            <h3>🔍 Busca Rápida</h3>
            <div class="busca-container">
                <input type="text" id="busca" placeholder="Nome...">
                <button onclick="buscarNoSistema()">Buscar</button>
            </div>
            <div id="carregando" class="spinner"></div>
            <div id="resumoBusca"></div>
        </div>
    </div>

    <script>
        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbyq6KHQLDptVM0J_wQ9DrSo4pmyDx5s6sGksnDSZ5ajXt8OhcTfnC-mrEcx34FpxZogMw/exec";
        const USUARIOS = ["edna", "junior", "mayara", "maraysa"];

        function verificarLogin() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const senha = document.getElementById('senhaInput').value;
            const salva = localStorage.getItem('senha_' + user);
            if (!USUARIOS.includes(user)) return alert("Não autorizado");
            if (!salva && senha === "1234") { 
                document.getElementById('tela-login').style.display='none'; 
                document.getElementById('tela-primeiro-acesso').style.display='flex';
            } else if (salva && senha === salva) { abrirSistema(); }
            else { alert("Senha incorreta"); }
        }

        function salvarNovaSenhaEEntrar() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const nova = document.getElementById('novaSenhaObrigatoria').value;
            localStorage.setItem('senha_' + user, nova);
            abrirSistema();
        }

        function abrirSistema() {
            document.getElementById('tela-login').style.display='none';
            document.getElementById('tela-primeiro-acesso').style.display='none';
            document.getElementById('tela-sistema').style.display='block';
            document.getElementById('data').valueAsDate = new Date();
        }

        async function calcularDebitoTotal() {
            const span = document.getElementById('valorDebitoTotal');
            span.innerText = "Calculando...";
            const resp = await fetch(URL_GOOGLE);
            const dados = await resp.json();
            let totalGeral = 0;
            dados.slice(1).forEach(l => {
                let v = parseFloat(l[3]);
                totalGeral += (l[4] === "Compra" ? v : -v);
            });
            span.innerText = "R$ " + totalGeral.toFixed(2);
        }

        async function listarClientes() {
            const div = document.getElementById('listaSanfona');
            div.innerHTML = "Carregando...";
            const resp = await fetch(URL_GOOGLE);
            const dados = await resp.json();
            const clientes = [...new Set(dados.slice(1).map(l => l[1]))].sort();
            
            div.innerHTML = "";
            clientes.forEach(nome => {
                const item = document.createElement('div');
                item.className = 'sanfona-item';
                item.innerHTML = `
                    <div class="sanfona-header" onclick="toggleSanfona(this)">
                        <span>👤 ${nome}</span> <span>➕</span>
                    </div>
                    <div class="sanfona-content">
                        <button class="btn-edit" onclick="editarNome('${nome}')">✏️ Renomear Cliente</button>
                        <div id="hist-${nome.replace(/\s/g,'')}">Buscando histórico...</div>
                    </div>`;
                div.appendChild(item);
            });
        }

        function toggleSanfona(el) {
            const content = el.nextElementSibling;
            content.style.display = content.style.display === "block" ? "none" : "block";
        }

        async function editarNome(nomeAntigo) {
            const novoNome = prompt("Digite o novo nome para " + nomeAntigo);
            if (!novoNome) return;
            if (confirm("Isso mudará o nome de '" + nomeAntigo + "' para '" + novoNome + "' em todos os registros. Confirma?")) {
                await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify({nomeAntigo, nomeNovo: novoNome, acao: 'editar'}) });
                alert("Solicitação enviada! Atualize a lista em instantes.");
            }
        }

        // Funções de Busca e Salvar seguem a mesma lógica anterior...
        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const dados = { data: document.getElementById('data').value, cliente: document.getElementById('cliente').value.trim(), valor: parseFloat(document.getElementById('valor').value), tipo: document.getElementById('tipo').value };
            btn.disabled = true;
            await fetch(URL_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
            alert("Salvo!"); btn.disabled = false;
        }

        async function buscarNoSistema() {
            const termo = document.getElementById('busca').value.trim().toLowerCase();
            document.getElementById('carregando').style.display = 'block';
            const resp = await fetch(URL_GOOGLE);
            const dados = await resp.json();
            const filtrados = dados.slice(1).filter(l => l[1].toLowerCase().includes(termo));
            document.getElementById('resumoBusca').innerHTML = filtrados.length + " registros encontrados.";
            document.getElementById('carregando').style.display = 'none';
        }
    </script>
</body>
</html>
